<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e3a5f;
    --cell: #162032;
    --cell-hover: #1e3a5f;
    --cell-revealed: #0d1520;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #39ff14;
    --red: #ff3355;
    --yellow: #ffd700;
    --text: #c8e6f5;
    --dim: #4a7a9b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(57,255,20,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5), 0 0 40px rgba(0,212,255,0.2);
    text-transform: uppercase;
  }

  .hud {
    display: flex;
    gap: 40px;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 10px 30px;
    border-radius: 4px;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0,212,255,0.4);
    min-width: 3ch;
    text-align: center;
  }

  .hud-value.danger { color: var(--red); text-shadow: 0 0 10px rgba(255,51,85,0.4); }
  .hud-value.safe { color: var(--green); text-shadow: 0 0 10px rgba(57,255,20,0.4); }

  #board {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 12px;
    border-radius: 4px;
    box-shadow: 0 0 30px rgba(0,212,255,0.05), inset 0 0 30px rgba(0,0,0,0.3);
    outline: none;
    position: relative;
  }

  .grid {
    display: grid;
    gap: 2px;
  }

  .cell {
    width: 32px;
    height: 32px;
    background: var(--cell);
    border: 1px solid #1a2940;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: bold;
    cursor: default;
    position: relative;
    transition: background 0.1s;
    border-radius: 2px;
    user-select: none;
  }

  .cell.cursor {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    background: var(--cell-hover);
    box-shadow: 0 0 8px rgba(0,212,255,0.4), inset 0 0 8px rgba(0,212,255,0.05);
    z-index: 2;
  }

  .cell.revealed {
    background: var(--cell-revealed);
    border-color: #0d1a26;
  }

  .cell.flagged {
    background: rgba(255,107,53,0.15);
    border-color: var(--accent2);
  }

  .cell.flagged::after {
    content: '⚑';
    color: var(--accent2);
    font-size: 1rem;
    text-shadow: 0 0 8px rgba(255,107,53,0.6);
  }

  .cell.mine-hit {
    background: rgba(255,51,85,0.3);
    border-color: var(--red);
    animation: explode 0.3s ease-out;
  }

  .cell.mine-revealed::after {
    content: '✦';
    color: var(--red);
    font-size: 1rem;
  }

  @keyframes explode {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); background: rgba(255,51,85,0.6); }
    100% { transform: scale(1); }
  }

  .n1 { color: #00d4ff; }
  .n2 { color: #39ff14; }
  .n3 { color: #ff3355; }
  .n4 { color: #7b68ee; }
  .n5 { color: #ff6b35; }
  .n6 { color: #00ffcc; }
  .n7 { color: #ff00ff; }
  .n8 { color: #ffffff; }

  .controls {
    display: flex;
    gap: 20px;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .control-key {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 3px;
    color: var(--accent);
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(10,14,26,0.85);
    border-radius: 4px;
    z-index: 10;
    flex-direction: column;
    gap: 12px;
    backdrop-filter: blur(2px);
  }

  .overlay.show { display: flex; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 0.2em;
  }

  .overlay-title.win { color: var(--green); text-shadow: 0 0 20px rgba(57,255,20,0.5); }
  .overlay-title.lose { color: var(--red); text-shadow: 0 0 20px rgba(255,51,85,0.5); }

  .overlay-sub {
    color: var(--dim);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
  }

  .restart-btn {
    margin-top: 8px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    padding: 8px 24px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 15px rgba(0,212,255,0.4);
  }

  .diff-bar {
    display: flex;
    gap: 8px;
  }

  .diff-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 5px 14px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .diff-btn:hover, .diff-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<h1>Minesweeper</h1>

<div class="diff-bar">
  <button class="diff-btn active" onclick="setDifficulty('easy')">Easy</button>
  <button class="diff-btn" onclick="setDifficulty('medium')">Medium</button>
  <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
</div>

<div class="hud">
  <div class="hud-item">
    <div class="hud-label">Mines</div>
    <div class="hud-value danger" id="mine-count">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Flags</div>
    <div class="hud-value" id="flag-count">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Time</div>
    <div class="hud-value safe" id="timer">000</div>
  </div>
</div>

<div id="board" tabindex="0">
  <div class="grid" id="grid"></div>
  <div class="overlay" id="overlay">
    <div class="overlay-title" id="overlay-title">—</div>
    <div class="overlay-sub" id="overlay-sub">—</div>
    <button class="restart-btn" onclick="initGame()">[ RESTART ]</button>
  </div>
</div>

<div class="controls">
  <span><span class="control-key">↑↓←→</span> Move</span>
  <span><span class="control-key">Enter</span> Reveal</span>
  <span><span class="control-key">Backspace</span> Flag</span>
</div>

<script>
const DIFFICULTIES = {
  easy:   { rows: 9,  cols: 9,  mines: 10 },
  medium: { rows: 16, cols: 16, mines: 40 },
  hard:   { rows: 16, cols: 30, mines: 99 },
};

let difficulty = 'easy';
let config = DIFFICULTIES[difficulty];
let board = [], revealed = [], flagged = [];
let curRow = 0, curCol = 0;
let mineCount, flagCount, timerVal, timerInterval;
let gameOver = false, firstClick = true;

function setDifficulty(d) {
  difficulty = d;
  config = DIFFICULTIES[d];
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === d));
  initGame();
}

function initGame() {
  clearInterval(timerInterval);
  config = DIFFICULTIES[difficulty];
  board = Array.from({length: config.rows}, () => Array(config.cols).fill(0));
  revealed = Array.from({length: config.rows}, () => Array(config.cols).fill(false));
  flagged = Array.from({length: config.rows}, () => Array(config.cols).fill(false));
  mineCount = config.mines;
  flagCount = 0;
  timerVal = 0;
  gameOver = false;
  firstClick = true;
  hitCell = null;
  curRow = 0; curCol = 0;

  document.getElementById('mine-count').textContent = mineCount;
  document.getElementById('flag-count').textContent = flagCount;
  document.getElementById('timer').textContent = '000';
  document.getElementById('overlay').classList.remove('show');

  renderGrid();
  document.getElementById('board').focus();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < config.mines) {
    const r = Math.floor(Math.random() * config.rows);
    const c = Math.floor(Math.random() * config.cols);
    if (board[r][c] !== -1 && !(Math.abs(r-safeR)<=1 && Math.abs(c-safeC)<=1)) {
      board[r][c] = -1;
      placed++;
    }
  }
  // Calculate numbers
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      if (board[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r+dr, nc = c+dc;
          if (nr>=0&&nr<config.rows&&nc>=0&&nc<config.cols&&board[nr][nc]===-1) count++;
        }
      board[r][c] = count;
    }
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${config.cols}, 32px)`;
  grid.innerHTML = '';
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `c-${r}-${c}`;
      grid.appendChild(cell);
    }
  }
  updateGrid();
}

function updateGrid() {
  for (let r = 0; r < config.rows; r++) {
    for (let c = 0; c < config.cols; c++) {
      const el = document.getElementById(`c-${r}-${c}`);
      el.className = 'cell';
      el.textContent = '';

      if (r === curRow && c === curCol) el.classList.add('cursor');

      if (revealed[r][c]) {
        el.classList.add('revealed');
        if (board[r][c] === -1) {
          el.classList.add('mine-revealed');
        } else if (board[r][c] > 0) {
          el.textContent = board[r][c];
          el.classList.add(`n${board[r][c]}`);
        }
      } else if (flagged[r][c]) {
        el.classList.add('flagged');
      }
    }
  }
}

let hitCell = null; // track which cell was the mine hit

function floodReveal(r, c) {
  // Iterative flood fill to avoid recursion stack overflow on large boards
  const stack = [[r, c]];
  while (stack.length > 0) {
    const [cr, cc] = stack.pop();
    if (cr<0||cr>=config.rows||cc<0||cc>=config.cols) continue;
    if (revealed[cr][cc] || flagged[cr][cc]) continue;
    revealed[cr][cc] = true;
    if (board[cr][cc] === 0) {
      for (let dr=-1;dr<=1;dr++)
        for (let dc=-1;dc<=1;dc++)
          stack.push([cr+dr, cc+dc]);
    }
  }
}

function reveal(r, c) {
  if (r<0||r>=config.rows||c<0||c>=config.cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  if (gameOver) return;

  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    timerInterval = setInterval(() => {
      timerVal++;
      document.getElementById('timer').textContent = String(timerVal).padStart(3,'0');
      if (timerVal >= 999) clearInterval(timerInterval);
    }, 1000);
  }

  if (board[r][c] === -1) {
    // Hit a mine
    clearInterval(timerInterval);
    gameOver = true;
    hitCell = `c-${r}-${c}`;
    revealed[r][c] = true;
    // Reveal all mines
    for (let rr = 0; rr < config.rows; rr++)
      for (let cc = 0; cc < config.cols; cc++)
        if (board[rr][cc] === -1) revealed[rr][cc] = true;
    updateGrid();
    // Re-apply mine-hit highlight after updateGrid overwrites classes
    const hitEl = document.getElementById(hitCell);
    if (hitEl) hitEl.classList.add('mine-hit');
    setTimeout(() => {
      document.getElementById('overlay-title').textContent = 'GAME OVER';
      document.getElementById('overlay-title').className = 'overlay-title lose';
      document.getElementById('overlay-sub').textContent = `Detonated after ${timerVal}s`;
      document.getElementById('overlay').classList.add('show');
    }, 400);
    return;
  }

  floodReveal(r, c);
  updateGrid();
  checkWin();
}

function checkWin() {
  let unrevealed = 0;
  for (let r=0;r<config.rows;r++)
    for (let c=0;c<config.cols;c++)
      if (!revealed[r][c] && board[r][c]!==-1) unrevealed++;
  if (unrevealed === 0) {
    clearInterval(timerInterval);
    gameOver = true;
    updateGrid();
    document.getElementById('overlay-title').textContent = 'CLEARED';
    document.getElementById('overlay-title').className = 'overlay-title win';
    document.getElementById('overlay-sub').textContent = `Completed in ${timerVal}s`;
    document.getElementById('overlay').classList.add('show');
  }
}

function toggleFlag(r, c) {
  if (revealed[r][c]) return;
  if (!flagged[r][c] && flagCount >= config.mines) return;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  document.getElementById('flag-count').textContent = flagCount;
  document.getElementById('mine-count').textContent = config.mines - flagCount;
  updateGrid();
}

document.getElementById('board').addEventListener('keydown', (e) => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','Backspace'].includes(e.key)) {
    e.preventDefault();
  }

  let moved = false;
  switch(e.key) {
    case 'ArrowUp':
      if (!gameOver) { curRow = Math.max(0, curRow-1); moved = true; } break;
    case 'ArrowDown':
      if (!gameOver) { curRow = Math.min(config.rows-1, curRow+1); moved = true; } break;
    case 'ArrowLeft':
      if (!gameOver) { curCol = Math.max(0, curCol-1); moved = true; } break;
    case 'ArrowRight':
      if (!gameOver) { curCol = Math.min(config.cols-1, curCol+1); moved = true; } break;
    case 'Enter':
      if (!gameOver) reveal(curRow, curCol); break;
    case 'Backspace':
      if (!gameOver) toggleFlag(curRow, curCol); break;
  }

  if (moved) {
    updateGrid();
    const el = document.getElementById(`c-${curRow}-${curCol}`);
    if (el) el.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  }
});

initGame();
</script>
</body>
</html>
